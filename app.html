<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0d1117">
  <title>CCTV Fleet Control — Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="platform" id="platform">

  <!-- ═══ HEADER ═══════════════════════════════ -->
  <header class="header">
    <div class="logo">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menú" onclick="RESP.toggleNav()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-title">CCTV Fleet Control</span>
        <span class="logo-sub">Sistema de Mantenimiento</span>
      </div>
      <div class="live-dot"></div>
      <button id="refreshBtn" class="btn btn-ghost btn-sm refresh-btn" onclick="APP.refreshPlatform()" title="Refrescar plataforma">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 101.14-4.52"/></svg>
      </button>
    </div>

    <div class="header-center" id="empresaTabsHeader"></div>

    <div class="header-right">
      <div class="header-stats">
        <div class="hstat"><span class="hstat-val" id="hstatTotal">0</span><span class="hstat-lbl">Total</span></div>
        <div class="hstat hstat-red"><span class="hstat-val" id="hstatPend">0</span><span class="hstat-lbl">Pendientes</span></div>
        <div class="hstat hstat-amber"><span class="hstat-val" id="hstatProc">0</span><span class="hstat-lbl">En proceso</span></div>
      </div>
      <div class="clock-wrap">
        <div class="clock-time" id="clockTime"></div>
        <div class="clock-date" id="clockDate"></div>
      </div>
      <!-- Usuario actual -->
      <div class="user-chip" id="userChip">
        <div class="user-chip-avatar" id="userAvatar">A</div>
        <div class="user-chip-info">
          <span class="user-chip-name" id="userNombre">—</span>
          <span class="user-chip-role" id="userRole">—</span>
        </div>
        <div class="user-chip-menu">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="user-dropdown" id="userDropdown">
          <button class="ud-item" onclick="APP.logout()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Cerrar Sesión
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══ NAV ═══════════════════════════════════ -->
  <nav class="nav" id="mainNav">
    <div class="nav-left" id="navLeft"></div>
    <div class="nav-right">
      <div class="view-toggle" id="viewToggle">
        <button class="vtbtn active" id="modeIndividual" onclick="APP.setViewMode('individual')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Individual
        </button>
        <button class="vtbtn" id="modeGeneral" onclick="APP.setViewMode('general')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          General
        </button>
      </div>
    </div>
  </nav>

  <!-- ═══ EMPRESA STRIP ═════════════════════════ -->
  <div class="empresa-strip" id="empresaStrip"></div>

  <!-- ═══ MAIN ══════════════════════════════════ -->
  <main class="main" id="mainContent"></main>

  <!-- Mobile nav backdrop -->
  <div class="mobile-nav-backdrop" id="mobileNavBackdrop" onclick="RESP.closeNav()"></div>

</div>
<div class="modal-overlay" id="modalOverlay" onclick="APP.closeModal(event)">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/supabaseService.js"></script>
<script src="js/dataService.js"></script>
<script src="js/auth.js"></script>
<script src="js/app-data.js"></script>
<script src="js/app-ui.js"></script>
<script src="js/app-modules.js"></script>
<script src="js/app-users.js"></script>
<script src="js/app-bulk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="js/app-flota.js"></script>
<script src="js/app-main.js"></script>
<script src="js/app-modules-patch.js"></script>
<script src="js/responsive.js"></script>
</body>
</html>
